name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        id: build
        run: |
          flutter build apk --release 2>&1 | tee /tmp/build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
          echo "Build completed with exit code ${PIPESTATUS[0]}"

      - name: Post build log to workflow run comments
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build.log', 'utf-8');
            const shortLog = log.slice(-6000); // last 6000 chars
            const status = log.includes('EXIT_CODE=0') ? '✅ SUCCESS' : '❌ FAILED';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## ${status} | Build Log (last 6KB)\n\n\`\`\`\n${shortLog}\n\`\`\``
            });
            // Also update the run
            await github.rest.actions.createWorkflowJob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              status: 'completed'
            });

      - name: Upload APK via GitHub Release
        if: env.EXIT_CODE == '0'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: 听股通 v${{ github.run_number }}
          body: "Build #${GITHUB_RUN_NUMBER}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}