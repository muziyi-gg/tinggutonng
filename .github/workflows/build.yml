name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          echo "---EXIT:$EXIT---" >> /tmp/build.log
          exit $EXIT

      - name: Publish APK + build log as GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            /tmp/build.log
          name: 听股通 v${{ github.run_number }}
          body: "Build #${GITHUB_RUN_NUMBER}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish build log as GitHub Release on failure
        if: failure()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-error-v${{ github.run_number }}
          name: 构建失败 v${{ github.run_number }}
          body: "查看 build.log 附件获取详细错误信息"
          files: /tmp/build.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}