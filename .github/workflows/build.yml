name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK (with retry)
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          echo "---BUILD EXIT: $EXIT---" >> /tmp/build.log
          if [ $EXIT -ne 0 ]; then
            echo "Retry in 15s..." >> /tmp/build.log
            sleep 15
            flutter build apk --release 2>&1 | tee -a /tmp/build.log
            EXIT2=${PIPESTATUS[0]}
            echo "---RETRY EXIT: $EXIT2---" >> /tmp/build.log
          fi
          exit $EXIT

      - name: Capture build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: /tmp/build.log
          retention-days: 3

      - name: Upload APK via GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: 听股通 v${{ github.run_number }}
          body: "Build #${GITHUB_RUN_NUMBER}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}