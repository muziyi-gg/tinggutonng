name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Clean stale build cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release 2>&1 | tee /tmp/build.log
          echo "---BUILD EXIT CODE: $?---"

      - name: Capture build error
        if: failure()
        run: |
          echo "=== BUILD LOG ===" && cat /tmp/build.log || echo "No log found"
          echo "=== END BUILD LOG ==="

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: /tmp/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tingutong-release-apk-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/
          retention-days: 7
