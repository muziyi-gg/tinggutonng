name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Clean stale build cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          echo "=== BUILD EXIT CODE: $EXIT_CODE ==="

      - name: Upload APK via GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: 听股通 v${{ github.run_number }}
          body: "自动构建 #${GITHUB_RUN_NUMBER}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: /tmp/build.log