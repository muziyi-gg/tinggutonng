name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Clean stale build cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tingutong-release-apk-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/
          retention-days: 7

      - name: Create Release via API
        if: success()
        run: |
          # Get artifact info
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          FILE_SIZE=$(wc -c < "$APK_PATH")
          
          # Create release
          RELEASE_JSON=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/releases \
            -d "{\"tag_name\":\"v${{ github.run_number }}\",\"name\":\"听股通 v${{ github.run_number }}\",\"draft\":false}")
          
          UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))")
          
          if [ -n "$UPLOAD_URL" ]; then
            echo "Release created. Uploading APK..."
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$APK_PATH" \
              "${UPLOAD_URL}?name=tinggutong-v${{ github.run_number }}-release.apk"
            echo "APK uploaded to release!"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
