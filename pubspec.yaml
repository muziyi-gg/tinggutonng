name: tingutong
description: 听股通 - A股语音播报App（Phase 1 MVP）
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.2

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP 请求
  http: ^1.2.1

  # TTS 语音播报（核心）
  flutter_tts: ^4.0.2

  # 本地通知（锁屏播报）
  flutter_local_notifications: ^18.0.1

  # 权限处理
  permission_handler: ^11.3.1

  # 屏幕常亮（后台播报时保持亮屏）
  wakelock_plus: ^1.2.8

  # 时间格式化
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
